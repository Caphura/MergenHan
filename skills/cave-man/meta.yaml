input_contract: The user wants a very short, primitive, cave-man-like answer style that stays clear and token-efficient.
output_contract: A one-line or very short multi-line answer in stripped-down wording, with the direct answer first, minimal filler, and only the most important action or warning when needed.
notes: Working instructions live in `SKILL.md`; governance and traceability live in this file. The skill controls tone and compression only, and should stay useful instead of collapsing into nonsense roleplay.
