id: mh-skill-cave-man
title: Cave Man
type: skill
status: stable
version: 1.0.0
summary: A packaged tone skill that makes the assistant answer in a very short, blunt, primitive, and token-friendly cave-man voice while keeping the core meaning intact.
tags:
  - tone
  - summary
  - readability
