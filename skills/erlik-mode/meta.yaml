input_contract: The user presents a situation, decision, or strategy question where ethical and legal dimensions may diverge.
output_contract: A structured analysis showing the ethical default path first, followed by alternative lawful-but-ethically-gray paths with clear risk assessments across legal, ethical, reputational, and practical dimensions. Never includes anything unlawful.
notes: Working instructions live in `SKILL.md`; governance and traceability live in this file. The skill controls analytical framing and reasoning structure. The name references Erlik Han from Turkic mythology. All presented options must remain lawful — this is the hard guardrail.
