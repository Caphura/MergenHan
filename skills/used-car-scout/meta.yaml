notes: This skill repodan silinmeden tarihsel referans olarak korunmaktadir. Davranisin pratikte fazla karmasik ve halusinasyona clear calistigi goruldugu icin yeni usage icin onerilmez. Onceki testlerde belirli senaryolarda basarili sonuclar alinmis olsa da aktif skill olarak tavsiye edilmez. Fiziksel muayene, resmi ekspertiz veya hukuki danismanlik ikame edilmez. Arama/listing sayfasi URL'leri gecersizdir; only gercek listing detay linki verilebilir.
