input_contract: Konum, yaricap, butce araligi ve opsiyonel olarak marka/model/yil/km tercihleri ile birlikte ikinci el arac ilanlarini analiz etme istegi.
output_contract: Firsat araclari ve uzak durulmasi gereken araclar listeleri; her birinde ilan linki, tramer degerlendirmesi, kirmizi bayraklar, fiyat konumlama ve onerilen sonraki adimlar.
notes: Bu skill 8 farkli test senaryosunda basariyla dogrulanmistir. Tramer tutarsizlik tespiti, kirmizi bayrak taramasi, fiyat karsilastirmasi, galeri/sahip ayrimi ve governance disiplini test edilmistir. Fiziksel muayene, resmi ekspertiz veya hukuki danismanlik ikame edilmez.
