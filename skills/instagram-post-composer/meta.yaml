title: Instagram Post Composer
type: skill
status: active
version: 1.0.0
summary: Professional'lar icin Instagram postlarini end-to-end olusturan, Nano Banana ile visual prompt ureten, detayli Canva layout rehberi sunan, caption yazan ve optimal yayinlama zamani oneren paketlenmis beceri.
tags:
