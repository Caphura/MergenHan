input_contract: Kullanici bir professional'in niche'ini, post konusunu ve varsa format tercihini verir. Ornek niche'ler psikolog, fitness koc, avukat, kisisel marka, gastronomi.
output_contract: Nano Banana visual promptu, detayli Canva layout rehberi (template kategorisi, hex renk kodlari, font eslestirmesi, grid onerisi), caption (hook + govde + CTA), hashtag stratejisi (10-15 arasi) ve optimal yayinlama zamani onerisi.
notes: Bu klasorde working talimatlari `SKILL.md` icinde, governance ve izlenebilirlik verisi bu dosyada tutulur. Visual prompt asamasinda mh-skill-nano-banana-image-prompt-composer referans alinir. Canva rehberi template kategorisi, renk paleti, tipografi ve grid onerilerini specific olarak icerir.
