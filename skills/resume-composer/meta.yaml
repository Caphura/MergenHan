title: Resume Composer
type: skill
status: stable
version: 1.0.0
summary: Mevcut resume veya ham kariyer notlarini okuyup, gerekirse tek kisa netlestirme turu acarak ATS-friendly, evidence-only ve role-tailored English resume taslagi ureten paketlenmis beceri.
tags:
  - positioning
  - guidance
  - workflow
  - readability
depends_on:
  - mh-blueprint-resume-composer
last_reviewed: 2026-04-04
