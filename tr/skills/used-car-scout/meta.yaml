notes: Bu skill repodan silinmeden tarihsel referans olarak korunmaktadir. Davranisin pratikte fazla karmasik ve halusinasyona acik calistigi goruldugu icin yeni kullanim icin onerilmez. Onceki testlerde belirli senaryolarda basarili sonuclar alinmis olsa da aktif skill olarak tavsiye edilmez. Fiziksel muayene, resmi ekspertiz veya hukuki danismanlik ikame edilmez. Arama/listing sayfasi URL'leri gecersizdir; yalnizca gercek ilan detay linki verilebilir.
