input_contract: Kullanici aktif olarak Unity 6 ile oyun gelistiriyor ve gameplay, UI, scene, prefab, input, physics veya entegrasyon gorevlerinden birini implement etme, debug etme, refactor etme ya da yapilandirma konusunda senior seviye yardim istiyor.
output_contract: Varsayimlari, etkilenen sistemleri, onerilen kod veya scene degisikliklerini ve dogrulama checklist'ini iceren kisa bir teshis veya uygulama yolu. Gerektiginde once tek kisa netlestirme turu acilir.
notes: Calisma talimatlari `SKILL.md` icinde, yonetisim ve izlenebilirlik verisi bu dosyada tutulur. Varsayilan davranis mevcut projeye uyan inspect-first uygulama destegi vermek, ancak gerekmedikce agir architecture degisimi zorlamamaktir.
